<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>FlowBot — Redirigiendo...</title>
    <script type="text/javascript">
      // Script para manejar rutas de SPA en GitHub Pages
      // Redirige la ruta actual a index.html con un parámetro de consulta
      var pathSegmentsToKeep = 1;

      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?p=/' +
        l.pathname.split('/').slice(1 + pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body>
  </body>
</html>
