name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  validate:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build
        env:
          # Client-side keys
          VITE_GEMINI_API_KEY: ${{ secrets.VITE_GEMINI_API_KEY }}
          VITE_GEMINI_API_KEY_FALLBACK: ${{ secrets.VITE_GEMINI_API_KEY_FALLBACK }}
          VITE_GEMINI_API_KEY_FALLBACK_2: ${{ secrets.VITE_GEMINI_API_KEY_FALLBACK_2 }}
          VITE_GROQ_API_KEY: ${{ secrets.VITE_GROQ_API_KEY }}
          VITE_GROQ_API_KEY_FALLBACK: ${{ secrets.VITE_GROQ_API_KEY_FALLBACK }}

          # Server-side fallback keys (used by proxy/server flows)
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY_FALLBACK: ${{ secrets.GEMINI_API_KEY_FALLBACK }}
          GEMINI_API_KEY_FALLBACK_2: ${{ secrets.GEMINI_API_KEY_FALLBACK_2 }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_API_KEY_FALLBACK: ${{ secrets.GROQ_API_KEY_FALLBACK }}
          GROQ_API_KEY_FALLBACK_2: ${{ secrets.GROQ_API_KEY_FALLBACK_2 }}

          # Prompt/thinking config
          VITE_SYSTEM_PROMPT: ${{ secrets.VITE_SYSTEM_PROMPT }}
          FLOWBOT_SYSTEM_PROMPT: ${{ secrets.FLOWBOT_SYSTEM_PROMPT }}
          VITE_THINKING_MODE_DEEP: ${{ secrets.VITE_THINKING_MODE_DEEP }}
          VITE_THINKING_MODE_SHORT: ${{ secrets.VITE_THINKING_MODE_SHORT }}
          FLOWBOT_THINKING_MODE_DEEP: ${{ secrets.FLOWBOT_THINKING_MODE_DEEP }}
          FLOWBOT_THINKING_MODE_SHORT: ${{ secrets.FLOWBOT_THINKING_MODE_SHORT }}

          # Network/runtime config
          VITE_PROXY_URL: ${{ secrets.VITE_PROXY_URL }}
          CORS_ORIGINS: ${{ secrets.CORS_ORIGINS }}
          VITE_BASE_PATH: /Flowbot---IA-integrada/

      - name: Lint
        run: npm run lint

  build:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build
        env:
          # Client-side keys
          VITE_GEMINI_API_KEY: ${{ secrets.VITE_GEMINI_API_KEY }}
          VITE_GEMINI_API_KEY_FALLBACK: ${{ secrets.VITE_GEMINI_API_KEY_FALLBACK }}
          VITE_GEMINI_API_KEY_FALLBACK_2: ${{ secrets.VITE_GEMINI_API_KEY_FALLBACK_2 }}
          VITE_GROQ_API_KEY: ${{ secrets.VITE_GROQ_API_KEY }}
          VITE_GROQ_API_KEY_FALLBACK: ${{ secrets.VITE_GROQ_API_KEY_FALLBACK }}
          VITE_GROQ_API_KEY_FALLBACK_2: ${{ secrets.VITE_GROQ_API_KEY_FALLBACK_2 }}

          # Server-side fallback keys (used by proxy/server flows)
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GEMINI_API_KEY_FALLBACK: ${{ secrets.GEMINI_API_KEY_FALLBACK }}
          GEMINI_API_KEY_FALLBACK_2: ${{ secrets.GEMINI_API_KEY_FALLBACK_2 }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GROQ_API_KEY_FALLBACK: ${{ secrets.GROQ_API_KEY_FALLBACK }}
          GROQ_API_KEY_FALLBACK_2: ${{ secrets.GROQ_API_KEY_FALLBACK_2 }}

          # Prompt/thinking config
          VITE_SYSTEM_PROMPT: ${{ secrets.VITE_SYSTEM_PROMPT }}
          FLOWBOT_SYSTEM_PROMPT: ${{ secrets.FLOWBOT_SYSTEM_PROMPT }}
          VITE_THINKING_MODE_DEEP: ${{ secrets.VITE_THINKING_MODE_DEEP }}
          VITE_THINKING_MODE_SHORT: ${{ secrets.VITE_THINKING_MODE_SHORT }}
          FLOWBOT_THINKING_MODE_DEEP: ${{ secrets.FLOWBOT_THINKING_MODE_DEEP }}
          FLOWBOT_THINKING_MODE_SHORT: ${{ secrets.FLOWBOT_THINKING_MODE_SHORT }}

          # Network/runtime config
          VITE_PROXY_URL: ${{ secrets.VITE_PROXY_URL }}
          CORS_ORIGINS: ${{ secrets.CORS_ORIGINS }}
          VITE_BASE_PATH: /Flowbot---IA-integrada/

      - name: Lint
        run: npm run lint

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    if: github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
