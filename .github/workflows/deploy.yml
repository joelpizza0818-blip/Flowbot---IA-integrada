name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  pull_request:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  validate:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Load .env file
        run: |
          cat .env >> $GITHUB_ENV
          echo "DEBUG: Variables cargadas desde .env"
          grep VITE_GEMINI_API_KEY $GITHUB_ENV || echo "No encontrado"

      - name: Debug env variables
        run: |
          echo "VITE_GEMINI_API_KEY: ${VITE_GEMINI_API_KEY:0:20}..."
          echo "VITE_GEMINI_API_KEY_FALLBACK: ${VITE_GEMINI_API_KEY_FALLBACK:0:20}..."
          echo "VITE_GEMINI_API_KEY_FALLBACK_2: ${VITE_GEMINI_API_KEY_FALLBACK_2:0:20}..."

      - name: Build
        run: npm run build
        env:
          VITE_GEMINI_API_KEY: ${{ env.VITE_GEMINI_API_KEY }}
          VITE_GEMINI_API_KEY_FALLBACK: ${{ env.VITE_GEMINI_API_KEY_FALLBACK }}
          VITE_GEMINI_API_KEY_FALLBACK_2: ${{ env.VITE_GEMINI_API_KEY_FALLBACK_2 }}
          VITE_SYSTEM_PROMPT: ${{ env.VITE_SYSTEM_PROMPT }}
          VITE_PROXY_URL: ${{ env.VITE_PROXY_URL }}
          VITE_BASE_PATH: /Flowbot---IA-integrada/

      - name: Lint
        run: npm run lint

  build:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Install dependencies
        run: npm install

      - name: Load .env file
        run: |
          cat .env >> $GITHUB_ENV
          echo "DEBUG: Variables cargadas desde .env"
          grep VITE_GEMINI_API_KEY $GITHUB_ENV || echo "No encontrado"

      - name: Debug env variables
        run: |
          echo "VITE_GEMINI_API_KEY: ${VITE_GEMINI_API_KEY:0:20}..."
          echo "VITE_GEMINI_API_KEY_FALLBACK: ${VITE_GEMINI_API_KEY_FALLBACK:0:20}..."
          echo "VITE_GEMINI_API_KEY_FALLBACK_2: ${VITE_GEMINI_API_KEY_FALLBACK_2:0:20}..."

      - name: Build
        run: npm run build
        env:
          VITE_GEMINI_API_KEY: ${{ env.VITE_GEMINI_API_KEY }}
          VITE_GEMINI_API_KEY_FALLBACK: ${{ env.VITE_GEMINI_API_KEY_FALLBACK }}
          VITE_GEMINI_API_KEY_FALLBACK_2: ${{ env.VITE_GEMINI_API_KEY_FALLBACK_2 }}
          VITE_SYSTEM_PROMPT: ${{ env.VITE_SYSTEM_PROMPT }}
          VITE_PROXY_URL: ${{ env.VITE_PROXY_URL }}
          VITE_BASE_PATH: /Flowbot---IA-integrada/

      - name: Lint
        run: npm run lint

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    if: github.event_name == 'push'
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
